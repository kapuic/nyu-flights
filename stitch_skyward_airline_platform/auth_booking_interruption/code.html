<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>

<title>Authentication Interruption</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "error-container": "#ffdad6",

                        "tertiary-container": "#001d32",
                        "on-error": "#ffffff",

                        "surface-container-lowest": "#ffffff",
                        "outline": "#76777d",
                        "surface-dim": "#d8dadc",
                        "surface-container-high": "#e6e8ea",
                        "primary-fixed": "#dae2fd",
                        "on-surface": "#191c1e",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-tertiary-container": "#3d89c3",
                        "tertiary-fixed-dim": "#94ccff",
                        "background": "#f7f9fb",
                        "outline-variant": "#c6c6cd",
                        "on-secondary-container": "#57657a",
                        "surface-container-low": "#f2f4f6",
                        "on-background": "#191c1e",
                        "on-secondary-fixed": "#0d1c2e",
                        "primary": "#000000",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2d3133",
                        "surface-bright": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "on-primary-container": "#7c839b",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "secondary": "#515f74",
                        "primary-container": "#131b2e",
                        "surface": "#f7f9fb",
                        "primary-fixed-dim": "#bec6e0",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#004b74",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Typography Scale Utilities based on guidelines */
        .text-display-lg {
            font-family: 'Manrope', sans-serif;
            font-size: 3.5rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        .text-headline-sm {
            font-family: 'Manrope', sans-serif;
            font-size: 1.5rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        .text-body-sm {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .text-label-sm {
            font-family: 'Inter', sans-serif;
            font-size: 0.6875rem;
            line-height: 1.2;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        /* Signature Gradient */
        .bg-signature-gradient {
            background: linear-gradient(to right, #000000, #131b2e);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased h-screen overflow-hidden relative">
<!-- Dimmed Background Content (Simulating the Booking Page) -->
<div class="absolute inset-0 opacity-40 pointer-events-none flex flex-col pt-24 px-8">
<div class="max-w-4xl mx-auto w-full space-y-12">
<!-- Simulated Header -->
<div class="flex justify-between items-baseline">
<div>
<h1 class="text-display-lg font-headline font-bold text-primary">JFK <span class="text-outline-variant mx-4">→</span> LHR</h1>
<p class="text-body-sm text-on-surface-variant mt-2">Flight AP-402 • October 12, 2024</p>
</div>
<div class="text-right">
<p class="text-headline-sm font-headline font-bold text-primary">$1,240</p>
<p class="text-label-sm text-on-surface-variant">Total per passenger</p>
</div>
</div>
<!-- Simulated Form Sections -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
<div class="md:col-span-2 space-y-8">
<!-- Passenger Details -->
<div class="bg-surface-container-lowest p-8 rounded-lg">
<h2 class="text-headline-sm font-headline font-bold text-primary mb-6">Passenger Details</h2>
<div class="space-y-6">
<div class="grid grid-cols-2 gap-4">
<div class="h-12 bg-surface-container-low rounded"></div>
<div class="h-12 bg-surface-container-low rounded"></div>
</div>
<div class="h-12 bg-surface-container-low rounded w-full"></div>
<div class="grid grid-cols-3 gap-4">
<div class="h-12 bg-surface-container-low rounded"></div>
<div class="h-12 bg-surface-container-low rounded"></div>
<div class="h-12 bg-surface-container-low rounded"></div>
</div>
</div>
</div>
</div>
<div class="space-y-8">
<!-- Fare Summary -->
<div class="bg-surface-container-highest p-8 rounded-lg">
<div class="h-6 bg-surface-container-low rounded w-1/2 mb-6"></div>
<div class="space-y-4 mb-8">
<div class="h-4 bg-surface-container-low rounded w-full"></div>
<div class="h-4 bg-surface-container-low rounded w-3/4"></div>
<div class="h-4 bg-surface-container-low rounded w-5/6"></div>
</div>
<div class="h-12 bg-surface-container-low rounded w-full"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="absolute inset-0 bg-inverse-surface/80 backdrop-blur-sm z-40 flex items-center justify-center p-4">
<!-- Authentication Modal -->
<div class="bg-surface-container-lowest w-full max-w-md rounded-lg shadow-2xl relative overflow-hidden flex flex-col" style="box-shadow: 0 20px 40px -10px rgba(25, 28, 30, 0.2);">
<!-- Progress Bar (Subtle hint that this is a step) -->
<div class="h-1 w-full bg-surface-container-low">
<div class="h-full bg-primary w-1/3"></div>
</div>
<div class="p-8 sm:p-10 flex-grow">
<!-- Close Button (Semantic task-departure) -->
<button aria-label="Close modal" class="absolute top-6 right-6 text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
<!-- Header -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-low text-primary mb-6">
<span class="material-symbols-outlined text-2xl" data-icon="lock" data-weight="fill">lock</span>
</div>
<h2 class="text-headline-sm font-headline font-bold text-primary mb-2 tracking-tight">Sign in to complete your booking</h2>
<p class="text-body-sm text-on-surface-variant">We need to verify your identity before securing these seats.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2 relative">
<label class="text-label-sm font-label text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-lowest text-on-surface text-body-sm border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-10 py-3 transition-colors rounded-none placeholder-outline" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2 relative">
<div class="flex justify-between items-baseline">
<label class="text-label-sm font-label text-on-surface-variant block" for="password">Password</label>
<a class="text-label-sm font-label text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="key">key</span>
<input class="w-full bg-surface-container-lowest text-on-surface text-body-sm border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-10 py-3 transition-colors rounded-none placeholder-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full bg-signature-gradient text-on-primary font-headline font-bold text-sm py-4 px-6 rounded-lg hover:opacity-90 transition-opacity flex justify-center items-center gap-2" type="submit">
                            Continue to Booking
                            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="flex-shrink-0 mx-4 text-label-sm text-outline">OR</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<button class="w-full bg-surface-container-high text-on-surface font-headline font-bold text-sm py-4 px-6 rounded-lg hover:bg-surface-dim transition-colors flex justify-center items-center gap-2" type="button">
                            Join SkyFlow
                        </button>
</div>
</form>
</div>
<!-- Contextual Footer -->
<div class="bg-surface-container-low p-6 text-center">
<p class="text-label-sm text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-base" data-icon="shield">shield</span>
                    Your connection is secure and encrypted
                </p>
</div>
</div>
</div>
</body></html>
